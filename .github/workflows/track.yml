name: track-chrome

# Daily check for a new Chrome stable release. Resolves the version -> Chrome
# DEPS -> PDFium DEPS -> the libpng SHA Chrome ships, bumps REF in build.yml, and
# tags chrome-<version>, which triggers build.yml.
#
# Requires a PAT with `contents: write` stored as TRACK_TOKEN: pushes made with
# the default GITHUB_TOKEN do not start other workflow runs.

on:
  schedule:
    - cron: '13 6 * * *'   # daily ~06:13 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TRACK_TOKEN }}

      - name: Resolve libpng SHA from the latest Chrome stable
        id: resolve
        run: |
          # 1. Latest Chrome stable (win64). The branch-head equals the BUILD
          #    component (3rd field) of the version, e.g. 149.0.7827.156 -> 7827.
          VERSION=$(curl -fsSL \
            'https://versionhistory.googleapis.com/v1/chrome/platforms/win64/channels/stable/versions?pageSize=1' \
            | jq -r '.versions[0].version')
          BUILD=$(printf '%s' "$VERSION" | cut -d. -f3)
          echo "Chrome stable: $VERSION (branch-head $BUILD)"

          # 2. Chrome's DEPS at that branch-head.
          CDEPS=$(curl -fsSL \
            "https://chromium.googlesource.com/chromium/src/+/refs/branch-heads/${BUILD}/DEPS?format=TEXT" \
            | base64 -d)

          # 3. PDFium is in Chrome's top-level DEPS; libpng is nested inside it.
          PDFIUM_SHA=$(printf '%s' "$CDEPS" \
            | sed -nE "s/.*'pdfium_revision': '([0-9a-f]{40})'.*/\1/p" | head -1)

          PDEPS=$(curl -fsSL \
            "https://pdfium.googlesource.com/pdfium/+/${PDFIUM_SHA}/DEPS?format=TEXT" \
            | base64 -d)

          NEW=$(printf '%s' "$PDEPS" \
            | sed -nE "s/.*'libpng_revision': '([0-9a-f]{40})'.*/\1/p" | head -1)

          test -n "$NEW" || { echo "failed to resolve libpng SHA"; exit 1; }
          echo "Resolved libpng SHA: $NEW"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$NEW" >> "$GITHUB_OUTPUT"

      - name: Bump REF if newer
        id: bump
        run: |
          CURRENT=$(grep -E '^  REF:' .github/workflows/build.yml | awk '{print $2}')
          NEW="${{ steps.resolve.outputs.sha }}"
          if [ "$CURRENT" = "$NEW" ]; then
            echo "libpng already at $CURRENT; nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          sed -i "s|^  REF: .*|  REF: $NEW|" .github/workflows/build.yml
          echo "Bumping $CURRENT -> $NEW"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.name "track-chrome bot"
          git config user.email "actions@github.com"
          NEW="${{ steps.resolve.outputs.sha }}"
          VERSION="${{ steps.resolve.outputs.version }}"
          git commit -am "bump libpng to Chrome $VERSION ($NEW)"
          git tag "chrome-${VERSION}"
          git push --follow-tags
