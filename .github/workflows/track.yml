name: track-chrome

# Checks for a new Chrome stable release every 6 hours. Resolves the version ->
# Chrome DEPS -> PDFium DEPS -> the libpng SHA Chrome ships, writes it to
# chrome.lock, tags libpng-<sha8>, and dispatches build.yml. No-op when the
# SHA is unchanged.
#
# No PAT needed: chrome.lock is a root-level data file (NOT under
# .github/workflows), so the default GITHUB_TOKEN may push the bump. build.yml
# is then started via `gh workflow run` (workflow_dispatch is the one event the
# default token may trigger). Storing the SHA in a workflow file is impossible
# without a PAT because the default token can never push workflow-file changes.

on:
  schedule:
    - cron: '7 2,8,14,20 * * *'   # every 6h, staggered across repos
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Resolve libpng SHA from the latest Chrome stable
        id: resolve
        run: |
          # 1. Latest Chrome stable (win64). The branch-head equals the BUILD
          #    component (3rd field) of the version, e.g. 149.0.7827.156 -> 7827.
          VERSION=$(curl -fsSL \
            'https://versionhistory.googleapis.com/v1/chrome/platforms/win64/channels/stable/versions?pageSize=1' \
            | jq -r '.versions[0].version')
          BUILD=$(printf '%s' "$VERSION" | cut -d. -f3)
          echo "Chrome stable: $VERSION (branch-head $BUILD)"

          # 2. Chrome's DEPS at that branch-head.
          CDEPS=$(curl -fsSL \
            "https://chromium.googlesource.com/chromium/src/+/refs/branch-heads/${BUILD}/DEPS?format=TEXT" \
            | base64 -d)

          # 3. PDFium is in Chrome's top-level DEPS; libpng is nested inside it.
          PDFIUM_SHA=$(printf '%s' "$CDEPS" \
            | sed -nE "s/.*'pdfium_revision': '([0-9a-f]{40})'.*/\1/p" | head -1)

          PDEPS=$(curl -fsSL \
            "https://pdfium.googlesource.com/pdfium/+/${PDFIUM_SHA}/DEPS?format=TEXT" \
            | base64 -d)

          NEW=$(printf '%s' "$PDEPS" \
            | sed -nE "s/.*'libpng_revision': '([0-9a-f]{40})'.*/\1/p" | head -1)

          test -n "$NEW" || { echo "failed to resolve libpng SHA"; exit 1; }
          echo "Resolved libpng SHA: $NEW"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$NEW" >> "$GITHUB_OUTPUT"

      - name: Write chrome.lock if newer
        id: bump
        run: |
          NEW="${{ steps.resolve.outputs.sha }}"
          VERSION="${{ steps.resolve.outputs.version }}"
          CURRENT=$(jq -r .sha chrome.lock)
          if [ "$CURRENT" = "$NEW" ]; then
            echo "libpng already at $CURRENT; nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # chrome.lock is a root-level data file; the default token may push it.
          jq -n --arg v "$VERSION" --arg s "$NEW" \
            '{chrome_version:$v, sha:$s}' > chrome.lock
          echo "Bumping $CURRENT -> $NEW"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.name "track-chrome bot"
          git config user.email "actions@github.com"
          NEW="${{ steps.resolve.outputs.sha }}"
          SHORT="${NEW:0:8}"
          VERSION="${{ steps.resolve.outputs.version }}"
          git add chrome.lock
          git commit -m "bump libpng to Chrome $VERSION ($NEW)"
          # Tag by library + short SHA, NOT Chrome version: the SHA changes on
          # every bump (including same-version security backports Chrome applies
          # to libpng), so a SHA-keyed tag never silently skips a rebuild.
          git tag "libpng-${SHORT}"
          git push --follow-tags

      - name: Dispatch build.yml (workflow_dispatch)
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW="${{ steps.resolve.outputs.sha }}"
          SHORT="${NEW:0:8}"
          gh workflow run build.yml -f tag="libpng-${SHORT}"
