name: build

on:
  push:
    tags: ["v*", "chrome-*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Chrome version (e.g. 149.0.7827.156). Tags the release chrome-<version>. Leave empty for a build-only run."
        required: false

env:
  # Chrome's libpng fork + the exact SHA Chrome 149 ships. Bumped automatically
  # by track.yml (resolves latest Chrome stable -> PDFium DEPS -> libpng).
  REPO: https://chromium.googlesource.com/chromium/src/third_party/libpng.git
  REF: 367bb5ca4af50342f709f444af04002527ce8b0f
  OSS_FUZZ_HARNESS_URL: https://raw.githubusercontent.com/google/oss-fuzz/master/projects/libpng/libpng_read_fuzzer.c
  AFL_BRANCH: stable

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        engine: [libfuzzer, afl]
        # AFL++ is Linux-native; there is no Windows AFL++ leg.
        exclude:
          - os: windows-latest
            engine: afl

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build zlib1g-dev git ca-certificates curl \
            aflplusplus clang

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # clang-cl, cmake, and vcpkg are preinstalled on windows-latest.
          choco install ninja -y --no-progress
          vcpkg install zlib:x64-windows-static

      - name: Fetch libpng source (Chrome-locked revision)
        shell: bash
        run: |
          git clone --no-checkout "$REPO" src
          git -C src fetch --depth 1 origin "$REF"
          git -C src checkout FETCH_HEAD

      - name: Fetch upstream OSS-Fuzz harness (libpng_read_fuzzer)
        shell: bash
        run: |
          curl -fsSL "$OSS_FUZZ_HARNESS_URL" -o harness.c
          grep -q "LLVMFuzzerTestOneInput" harness.c

      - name: Resolve the fuzzing engine and toolchain
        shell: bash
        run: |
          if [ "${{ matrix.engine }}" = "libfuzzer" ]; then
            if [ "$RUNNER_OS" = "Windows" ]; then
              echo "CC=clang-cl" >> "$GITHUB_ENV"
            else
              echo "CC=clang" >> "$GITHUB_ENV"
            fi
            # libpng is instrumented but does not pull in main(); the harness is
            # compiled with -fsanitize=fuzzer so clang/clang-cl links the libFuzzer
            # runtime (which supplies main()) for the right platform.
            echo "LIB_CFLAGS=-fsanitize=fuzzer-no-link,address -g -O1" >> "$GITHUB_ENV"
            echo "HARNESS_CFLAGS=-fsanitize=fuzzer,address -g -O1" >> "$GITHUB_ENV"
            echo "HARNESS_LINK=" >> "$GITHUB_ENV"
          else
            # AFL++ (Linux only): afl-clang-fast instruments; its driver supplies main().
            DRIVER=""
            for p in /usr/lib/afl/afl_driver.o \
                     /usr/lib/x86_64-linux-gnu/afl/afl_driver.o; do
              if [ -f "$p" ]; then DRIVER="$p"; break; fi
            done
            if [ -z "$DRIVER" ]; then
              curl -fsSL \
                "https://raw.githubusercontent.com/AFLplusplus/AFLplusplus/${AFL_BRANCH}/utils/afl_driver.cpp" \
                -o afl_driver.cpp
              afl-clang-fast++ -O1 -g afl_driver.cpp -c -o afl_driver.o
              DRIVER="$PWD/afl_driver.o"
            fi
            echo "AFL_USE_ASAN=1" >> "$GITHUB_ENV"
            echo "CC=afl-clang-fast" >> "$GITHUB_ENV"
            echo "LIB_CFLAGS=-g -O1" >> "$GITHUB_ENV"
            echo "HARNESS_CFLAGS=-g -O1" >> "$GITHUB_ENV"
            echo "HARNESS_LINK=$DRIVER" >> "$GITHUB_ENV"
          fi

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build libpng static library
        shell: bash
        run: |
          EXTRA_ARGS=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            EXTRA_ARGS="-DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static"
          fi

          cmake -S src -B build -G Ninja \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_C_FLAGS_INIT="$LIB_CFLAGS" \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DPNG_SHARED=OFF \
            -DPNG_STATIC=ON \
            -DPNG_TESTS=OFF \
            $EXTRA_ARGS

          cmake --build build

      - name: Build the harness
        shell: bash
        run: |
          mkdir -p out
          # Link the libpng static lib by path so the name (libpng16.a vs png16.lib)
          # and zlib source (system -lz vs vcpkg path) do not matter.
          PNGLIB=$(ls build/libpng16.a build/libpng*.a build/png16.lib build/png*.lib 2>/dev/null | head -1)

          if [ "$RUNNER_OS" = "Linux" ]; then
            "$CC" $HARNESS_CFLAGS harness.c $HARNESS_LINK \
              "$PNGLIB" -lz \
              -I src -I build \
              -o "out/png_${{ matrix.engine }}_fuzzer"
          else
            ZLIBLIB=$(ls "$VCPKG_ROOT"/installed/x64-windows-static/lib/zlib*.lib 2>/dev/null | head -1)
            ZLIBINC="$VCPKG_ROOT/installed/x64-windows-static/include"
            "$CC" $HARNESS_CFLAGS harness.c $HARNESS_LINK \
              "$PNGLIB" "$ZLIBLIB" \
              -I src -I build -I "$ZLIBINC" \
              /DEBUG \
              -o "out/png_${{ matrix.engine }}_fuzzer.exe"
          fi

      - name: Smoke test
        shell: bash
        run: |
          # Resolve the actual binary; do not try to execute the Windows .pdb.
          BIN=$(ls "out/png_${{ matrix.engine }}_fuzzer" \
                     "out/png_${{ matrix.engine }}_fuzzer.exe" 2>/dev/null | head -1)
          if [ "${{ matrix.engine }}" = "libfuzzer" ]; then
            "$BIN" -runs=1 >/dev/null 2>&1 || true
          else
            "$BIN" </dev/null >/dev/null 2>&1 || true
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: png-${{ matrix.engine }}-${{ runner.os }}
          path: out/*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "tag=chrome-${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: artifacts/**/*
