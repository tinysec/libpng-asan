name: build

on:
  push:
    tags: ["v*", "chrome-*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Chrome version (e.g. 150.0.7871.24). Tags the release chrome-<version>. Leave empty for a build-only run."
        required: false

env:
  # Chrome vendors libpng; its fork ships only BUILD.gn (no CMakeLists.txt).
  # We read the fork's version (PNG_LIBPNG_VER_STRING) and build the matching
  # UPSTREAM libpng release with its native CMake -- the same approach as
  # libjpeg-turbo. The upstream tree also ships the contrib/oss-fuzz harnesses.
  FORK_REPO: https://chromium.googlesource.com/chromium/src/third_party/libpng.git
  UPSTREAM_REPO: https://github.com/pnggroup/libpng.git

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        # Two matrix dimensions => 4 parallel jobs:
        #   os   : Linux and Windows build independently and concurrently.
        #   mode : the (slow) ASAN-library compile and the libFuzzer compile
        #          run as separate parallel legs instead of one after the other.
        # Each leg ships one ASAN-instrumented artifact:
        #   asan      -> static + dynamic libraries (link into your own harness)
        #   libfuzzer -> self-contained libFuzzer binaries (libFuzzer engine)
        os: [ubuntu-latest, windows-latest]
        mode: [asan, libfuzzer]

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Read Chrome-locked revision from chrome.lock
        id: lock
        shell: bash
        run: |
          echo "sha=$(jq -r .sha chrome.lock)" >> "$GITHUB_OUTPUT"

      - name: Resolve the libpng release Chrome vendors
        id: ver
        shell: bash
        run: |
          # PNG_LIBPNG_VER_STRING lives in the Chrome fork's png.h; it is the
          # upstream release tag Chrome vendors (e.g. "1.6.58" -> v1.6.58).
          HDR=$(curl -fsSL "${FORK_REPO}/+/${{ steps.lock.outputs.sha }}/png.h?format=TEXT" | base64 -d)
          PNG_VER=$(printf '%s\n' "$HDR" | sed -nE 's/#define[[:space:]]+PNG_LIBPNG_VER_STRING[[:space:]]+"([^"]+)"/\1/p' | head -1)
          test -n "$PNG_VER" || { echo "could not determine libpng version from fork header"; exit 1; }
          echo "libpng_version=$PNG_VER" >> "$GITHUB_OUTPUT"
          echo "Resolved Chrome libpng version: $PNG_VER"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git ca-certificates curl clang

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # ninja is not preinstalled on windows-latest.
          choco install ninja -y --no-progress
          # The clang-cl already on PATH is the VS-bundled REDUCED LLVM, which
          # omits the sanitizer runtimes (clang_rt.asan-x86_64.lib and the
          # fuzzer runtime) that the ASAN DLL and the libFuzzer exes must link.
          # Install a COMPLETE LLVM (full runtime set); the toolchain step pins
          # CC/CXX to it explicitly so PATH reordering by msvc-dev-cmd cannot
          # revert us to the reduced build.
          choco install llvm -y --no-progress

      - name: Fetch upstream libpng source (Chrome-vendored release)
        shell: bash
        run: |
          git clone --depth 1 --branch "v${{ steps.ver.outputs.libpng_version }}" "$UPSTREAM_REPO" src

      # MSVC env is set up BEFORE the toolchain step so the SDK libraries are
      # on LIB and the MSVC headers on INCLUDE for the clang-cl + /MT build.
      # The ASAN runtime itself is passed as an absolute path on the link line
      # (see the toolchain step), not via LIB.
      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Resolve the ASAN + libFuzzer toolchain
        shell: bash
        run: |
          # Two flag sets:
          #   ASAN_*  -> library pass: ASAN memory checks only, clean lib.
          #   FUZZ_*  -> libFuzzer pass: ASAN + SanitizerCoverage (fuzzer-no-link)
          #              on the lib/harness, then -fsanitize=fuzzer at link pulls
          #              libFuzzer's main() and engine.
          # /MT must live in the flags themselves (not only via
          # CMAKE_MSVC_RUNTIME_LIBRARY): the runtime-library property applies to
          # real targets but NOT to CMake's try_compile/check_* probes, so those
          # probes would otherwise compile with the default /MD, which clang-cl
          # rejects under -fsanitize=address ("ASAN requires static CRT").
          if [ "$RUNNER_OS" = "Windows" ]; then
            # Pin CC/CXX to the COMPLETE LLVM installed in the deps step
            # (C:\Program Files\LLVM). The bare 'clang-cl' on PATH is the
            # VS-bundled REDUCED LLVM, which omits the ASAN/fuzzer runtimes, so
            # -print-file-name returns a bare name and the DLL/fuzz-exe links
            # fail. The explicit path is immune to PATH reordering by
            # msvc-dev-cmd, and keeps the compiler and the ASAN runtime from
            # the same LLVM (matching ABI).
            CLANG_CL="C:/Program Files/LLVM/bin/clang-cl.exe"
            echo "CC=$CLANG_CL" >> "$GITHUB_ENV"
            echo "CXX=$CLANG_CL" >> "$GITHUB_ENV"
            echo "OBJEXT=obj" >> "$GITHUB_ENV"
            echo "ASAN_CFLAGS=-fsanitize=address -g -O1 /Zi /MT" >> "$GITHUB_ENV"
            echo "FUZZ_CFLAGS=-fsanitize=fuzzer-no-link,address -g -O1 /Zi /MT" >> "$GITHUB_ENV"
            echo "FUZZ_LINKFLAGS=-fsanitize=fuzzer,address /DEBUG" >> "$GITHUB_ENV"
            echo "CXX_EXTRA=/EHsc" >> "$GITHUB_ENV"

            # The shipped Windows LLVM (20.1.x) provides ONLY the DYNAMIC ASAN
            # runtime: clang_rt.asan_dynamic-x86_64.dll + its import lib + the
            # DYNAMIC runtime thunk. The STATIC clang_rt.asan-x86_64.lib is NOT
            # shipped for the MSVC ABI, so static-ASAN linking fails with
            # undefined __asan_* symbols. Use the DYNAMIC model. SECOND gotcha:
            # CMake links DLLs/exes via `cmake -E vs_link_* ... lld-link`, NOT
            # through the clang-cl driver, so -fsanitize=address on the link line
            # is SILENTLY IGNORED by lld-link and the runtime is never
            # auto-linked. The runtime MUST therefore be passed as explicit input
            # libs on every CMake driven link (zlib's shared DLL, png_shared.dll).
            # clang_rt.asan_dynamic-x86_64.lib (import lib) resolves the __asan_*
            # references; /wholearchive on the DYNAMIC runtime thunk forces the
            # ASAN initializer + CRT allocator hooks (malloc/free) to be pulled
            # so checks actually run at runtime. CRITICAL: pair the import lib
            # with asan_DYNAMIC_runtime_thunk, NOT the static one -- the static
            # thunk double-defines malloc/free against the dynamic import lib
            # (lld-link: duplicate symbol: malloc/free). (The libpng fuzz-harness
            # link runs clang-cl DIRECTLY, where -fsanitize=fuzzer,address DOES
            # auto-link -- left untouched.) Copy the libs into the space-free
            # workspace (CMake space-splits linker flags and "Program Files" has a
            # space) and ship the ASAN DLL too.
            LLVM_RT_DIR="C:/Program Files/LLVM/lib/clang"
            ASAN_DYN_IMPORT=""; ASAN_THUNK=""; ASAN_DLL=""
            for d in "$LLVM_RT_DIR"/*/lib/windows; do
              if [ -f "$d/clang_rt.asan_dynamic-x86_64.lib" ]; then ASAN_DYN_IMPORT="$d/clang_rt.asan_dynamic-x86_64.lib"; fi
              if [ -f "$d/clang_rt.asan_dynamic_runtime_thunk-x86_64.lib" ]; then ASAN_THUNK="$d/clang_rt.asan_dynamic_runtime_thunk-x86_64.lib"; fi
              if [ -f "$d/clang_rt.asan_dynamic-x86_64.dll" ]; then ASAN_DLL="$d/clang_rt.asan_dynamic-x86_64.dll"; fi
            done
            if [ -z "$ASAN_DYN_IMPORT" ] || [ -z "$ASAN_THUNK" ]; then
              echo "dynamic ASAN runtime not found under $LLVM_RT_DIR"
              ls -la "$LLVM_RT_DIR"/*/lib/windows/ 2>/dev/null
              exit 1
            fi
            WS_FWD=$(echo "$GITHUB_WORKSPACE" | sed 's|\\|/|g')
            cp "$ASAN_DYN_IMPORT" "$GITHUB_WORKSPACE/asan_dynamic.lib"
            cp "$ASAN_THUNK" "$GITHUB_WORKSPACE/asan_thunk.lib"
            echo "ASAN_DLL=$ASAN_DLL" >> "$GITHUB_ENV"
            echo "ASAN_LDFLAGS=${WS_FWD}/asan_dynamic.lib /wholearchive:${WS_FWD}/asan_thunk.lib /DEBUG" >> "$GITHUB_ENV"
          else
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
            echo "OBJEXT=o" >> "$GITHUB_ENV"
            echo "ASAN_CFLAGS=-fsanitize=address -g -O1" >> "$GITHUB_ENV"
            echo "ASAN_LDFLAGS=-fsanitize=address" >> "$GITHUB_ENV"
            echo "FUZZ_CFLAGS=-fsanitize=fuzzer-no-link,address -g -O1" >> "$GITHUB_ENV"
            echo "FUZZ_LINKFLAGS=-fsanitize=fuzzer,address" >> "$GITHUB_ENV"
            echo "CXX_EXTRA=" >> "$GITHUB_ENV"
          fi

      - name: Build zlib from source (ASAN-matched)
        shell: bash
        env:
          MSYS_NO_PATHCONV: "1"
        run: |
          # Build zlib with the SAME ASAN toolchain + CRT as libpng so the
          # dependency shares one runtime. On Linux this also fixes CMake
          # FindZLIB (which found the system headers but not the .so); on
          # Windows there is no system zlib usable by clang-cl. Both passes
          # (asan and libfuzzer) link this exact zlib.
          git clone --depth 1 --branch v1.3.1 https://github.com/madler/zlib.git zlib-src
          ZEXTRA=()
          if [ "$RUNNER_OS" = "Windows" ]; then
            ZEXTRA+=(-DCMAKE_C_COMPILER="$CC" -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded)
          else
            ZEXTRA+=(-DCMAKE_C_COMPILER="$CC")
          fi
          ZEXTRA+=(-DCMAKE_C_FLAGS_INIT="$ASAN_CFLAGS")
          # STATIC_LIBRARY target type makes CMake's compiler test archive the
          # objects instead of linking an EXE -- an ASAN-instrumented try-compile
          # EXE would fail with undefined __asan_init because the runtime is not
          # on the try-compile link line.
          ZEXTRA+=(-DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY)
          # zlib builds a shared zlibd.dll (Windows) / libz.so (Linux) in
          # addition to the static lib we actually link against. The
          # ASAN-instrumented shared lib needs the ASAN runtime at link time:
          # undefined symbols are tolerated in a Linux .so (resolved at load)
          # but are a hard link error for a Windows DLL, so feed the runtime to
          # zlib's shared/exe link flags here.
          ZEXTRA+=(-DCMAKE_SHARED_LINKER_FLAGS_INIT="$ASAN_LDFLAGS")
          ZEXTRA+=(-DCMAKE_EXE_LINKER_FLAGS_INIT="$ASAN_LDFLAGS")
          cmake -S zlib-src -B zlib-build -G Ninja "${ZEXTRA[@]}" \
            -DCMAKE_INSTALL_PREFIX="$PWD/zlib-install"
          cmake --build zlib-build --target install
          # Store the install dir as a NATIVE path. Git-Bash $PWD is the MSYS
          # form (/d/a/...), which CMake tolerates but native clang-cl cannot
          # read -- and the libfuzzer pass links png objects + zlib via clang-cl
          # DIRECTLY (not through CMake), so a /d/a/... path there fails with
          # 'clang-cl: no such file or directory'. cygpath -m yields a mixed
          # D:/a/... path that both CMake and clang-cl accept. On Linux $PWD is
          # already native, so no conversion is needed.
          ZROOT="$PWD/zlib-install"
          if [ "$RUNNER_OS" = "Windows" ]; then ZROOT=$(cygpath -m "$ZROOT"); fi
          echo "ZLIB_INSTALL=$ZROOT" >> "$GITHUB_ENV"

      # ----------------------------------------------------------------------
      # PASS A: ASAN static + dynamic libraries (clean, no fuzzer coverage).
      # ----------------------------------------------------------------------
      - name: Build libpng static + dynamic (ASAN)
        if: matrix.mode == 'asan'
        shell: bash
        env:
          MSYS_NO_PATHCONV: "1"
        run: |
          mkdir -p out/lib/include

          EXTRA_ARGS=(-DZLIB_ROOT="$ZLIB_INSTALL")
          if [ "$RUNNER_OS" = "Windows" ]; then
            EXTRA_ARGS+=(-DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded)
          fi

          # PNG_SHARED=ON + PNG_STATIC=ON produce both libraries. PNG_TESTS and
          # PNG_TOOLS are OFF so nothing links an executable (no harness here).
          cmake -S src -B build-asan -G Ninja \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_C_FLAGS_INIT="$ASAN_CFLAGS" \
            -DCMAKE_CXX_FLAGS_INIT="$ASAN_CFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS_INIT="$ASAN_LDFLAGS" \
            -DCMAKE_SHARED_LINKER_FLAGS_INIT="$ASAN_LDFLAGS" \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DPNG_SHARED=ON \
            -DPNG_STATIC=ON \
            -DPNG_TESTS=OFF \
            -DPNG_TOOLS=OFF \
            "${EXTRA_ARGS[@]}"
          cmake --build build-asan

          # Real library files only (-type f skips Linux .so symlinks).
          find build-asan -type f \( \
              -name 'libpng*.a' -o -name 'libpng*.so*' -o \
              -name 'libpng*.lib' -o -name 'libpng*.dll' -o -name 'libpng*.pdb' \
            \) -exec cp {} out/lib/ \;
          cp src/png.h src/pngconf.h out/lib/include/ 2>/dev/null || true
          cp build-asan/pnglibconf.h out/lib/include/ 2>/dev/null || true
          # Ship the ASAN-matched zlib headers so a downstream harness compiles.
          cp "$ZLIB_INSTALL"/include/zlib.h "$ZLIB_INSTALL"/include/zconf.h out/lib/include/ 2>/dev/null || true
          # Ship the dynamic ASAN runtime DLL: the ASAN-instrumented png_shared.dll
          # imports __asan_* from it, so it must sit beside the lib to run. Windows
          # only -- ASAN_DLL is empty on Linux.
          if [ -n "$ASAN_DLL" ]; then cp "$ASAN_DLL" out/lib/; fi
          ls -la out/lib out/lib/include

      # ----------------------------------------------------------------------
      # PASS B: libFuzzer binaries (ASAN + coverage + libFuzzer engine).
      # The harnesses are upstream's public contrib/oss-fuzz/*.cc.
      # ----------------------------------------------------------------------
      - name: Build libpng libFuzzer targets
        if: matrix.mode == 'libfuzzer'
        shell: bash
        env:
          MSYS_NO_PATHCONV: "1"
        run: |
          mkdir -p obj-fuzz out/fuzz

          # pnglibconf.h is the generated feature-config header that png.h
          # includes. This pass skips CMake (upstream libpng has no WITH_FUZZ),
          # so reuse the canonical prebuilt config shipped in the tree -- the
          # same one oss-fuzz libpng builds rely on.
          GENINC=geninclude
          mkdir -p "$GENINC"
          cp src/scripts/pnglibconf.h.prebuilt "$GENINC/pnglibconf.h"

          # Link the ASAN-matched zlib built earlier (zlibstatic.lib on Windows,
          # libz.a on Linux). No reliance on a system lib.
          ZLIBINC="$ZLIB_INSTALL/include"
          if [ "$RUNNER_OS" = "Windows" ]; then
            ZLIBLIB="$ZLIB_INSTALL/lib/zlibstatic.lib"
          else
            ZLIBLIB="$ZLIB_INSTALL/lib/libz.a"
          fi

          # The portable C core of libpng, compiled with ASAN + fuzzer coverage.
          PNG_SRCS="src/png.c src/pngerror.c src/pngget.c src/pngmem.c src/pngpread.c \
            src/pngread.c src/pngrio.c src/pngrtran.c src/pngrutil.c src/pngset.c \
            src/pngtrans.c src/pngwio.c src/pngwrite.c src/pngwtran.c src/pngwutil.c"

          for c in $PNG_SRCS; do
            base=$(basename "${c%.c}")
            "$CC" -c $FUZZ_CFLAGS "$c" -I "$GENINC" -I src -I "$ZLIBINC" -o "obj-fuzz/${base}.${OBJEXT}"
          done

          # Each upstream oss-fuzz harness -> one self-contained libFuzzer exe.
          for h in src/contrib/oss-fuzz/libpng_*_fuzzer.cc; do
            [ -f "$h" ] || continue
            name=$(basename "${h%.cc}")
            if [ "$RUNNER_OS" = "Windows" ]; then
              "$CXX" $FUZZ_CFLAGS $CXX_EXTRA "$h" obj-fuzz/*.obj "$ZLIBLIB" \
                $FUZZ_LINKFLAGS \
                -I "$GENINC" -I src -I src/contrib/oss-fuzz -I "$ZLIBINC" \
                -o "out/fuzz/${name}.exe"
            else
              "$CXX" $FUZZ_CFLAGS $CXX_EXTRA "$h" obj-fuzz/*.o "$ZLIBLIB" \
                $FUZZ_LINKFLAGS \
                -I "$GENINC" -I src -I src/contrib/oss-fuzz -I "$ZLIBINC" \
                -o "out/fuzz/${name}"
            fi
          done

          # Ship the fuzzer dictionary alongside the binaries.
          cp src/contrib/oss-fuzz/png.dict out/fuzz/ 2>/dev/null || true
          # Ship the dynamic ASAN runtime DLL beside the fuzz exes: they are
          # ASAN-instrumented (-fsanitize=fuzzer,address) and import __asan_* from
          # this DLL at runtime. Windows only -- ASAN_DLL is empty on Linux.
          if [ -n "$ASAN_DLL" ]; then cp "$ASAN_DLL" out/fuzz/; fi
          ls -la out/fuzz

      - name: Verify artifacts
        shell: bash
        run: |
          # Each mode must have produced its own key artifact.
          if [ "${{ matrix.mode }}" = "asan" ]; then
            STAT=$(find out/lib -type f \( -name 'libpng*.a' -o -name 'libpng_static*.lib' -o -name 'libpng16*.lib' \) | head -1)
            DYN=$(find out/lib -type f \( -name 'libpng*.so*' -o -name 'libpng*.dll' \) | head -1)
            test -n "$STAT" || { echo "ERROR: ASAN static lib missing"; exit 1; }
            test -n "$DYN"  || { echo "ERROR: ASAN dynamic lib missing"; exit 1; }
            echo "asan-static:  $STAT"
            echo "asan-dynamic: $DYN"
          else
            FZ=$(find out/fuzz -type f \( -name 'libpng_*_fuzzer' -o -name 'libpng_*_fuzzer.exe' \) | head -1)
            test -n "$FZ" || { echo "ERROR: libFuzzer binary missing"; exit 1; }
            echo "libfuzzer: $FZ"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: png-asan-${{ matrix.mode }}-${{ matrix.os }}
          path: out
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "tag=chrome-${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: artifacts/**/*
