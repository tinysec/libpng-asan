name: build

on:
  push:
    tags: ["v*", "chrome-*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Chrome version (e.g. 149.0.7827.156). Tags the release chrome-<version>. Leave empty for a build-only run."
        required: false

env:
  # Chrome's libpng fork. The Chrome-locked SHA lives in chrome.lock (written by
  # track.yml) so the default token can push bumps without touching this file.
  REPO: https://chromium.googlesource.com/chromium/src/third_party/libpng.git

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        # libFuzzer only. AFL++ (afl-clang-fast) is Linux-native and cannot run
        # on Windows; Windows AFL++ fuzzing is handled separately via WinAFL.
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Read Chrome-locked revision from chrome.lock
        id: lock
        shell: bash
        run: |
          echo "sha=$(jq -r .sha chrome.lock)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build zlib1g-dev git ca-certificates curl clang

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # clang-cl and cmake are preinstalled on windows-latest; vcpkg provides zlib.
          choco install ninja -y --no-progress
          vcpkg install zlib:x64-windows-static

      - name: Fetch libpng source (Chrome-locked revision)
        shell: bash
        run: |
          git clone --no-checkout "$REPO" src
          git -C src fetch --depth 1 origin "${{ steps.lock.outputs.sha }}"
          git -C src checkout FETCH_HEAD

      - name: Resolve the libFuzzer toolchain
        shell: bash
        run: |
          # The harness (src/contrib/oss-fuzz/libpng_read_fuzzer.cc) is C++, so a
          # C++ compiler is required in addition to the C compiler that builds libpng.
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "CC=clang-cl" >> "$GITHUB_ENV"
            echo "CXX=clang-cl" >> "$GITHUB_ENV"
            # /Zi + /DEBUG emit a side .pdb so ASAN stacks resolve to source.
            echo "LIB_CFLAGS=-fsanitize=fuzzer-no-link,address -g -O1 /Zi" >> "$GITHUB_ENV"
            echo "HARNESS_CFLAGS=-fsanitize=fuzzer,address -g -O1 /Zi" >> "$GITHUB_ENV"
            echo "HARNESS_EXTRA=-EHsc" >> "$GITHUB_ENV"
          else
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
            echo "LIB_CFLAGS=-fsanitize=fuzzer-no-link,address -g -O1" >> "$GITHUB_ENV"
            echo "HARNESS_CFLAGS=-fsanitize=fuzzer,address -g -O1" >> "$GITHUB_ENV"
            echo "HARNESS_EXTRA=" >> "$GITHUB_ENV"
          fi

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build libpng static library
        shell: bash
        run: |
          EXTRA_ARGS=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            EXTRA_ARGS="-DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static"
          fi

          cmake -S src -B build -G Ninja \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_C_FLAGS_INIT="$LIB_CFLAGS" \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DPNG_SHARED=OFF \
            -DPNG_STATIC=ON \
            -DPNG_TESTS=OFF \
            $EXTRA_ARGS

          cmake --build build

      - name: Build the harness (libpng_read_fuzzer.cc + libFuzzer main)
        shell: bash
        run: |
          mkdir -p out
          # Link the static lib by path so its name (libpng16.a vs png16.lib) and
          # the zlib source (system -lz vs vcpkg path) do not matter.
          PNGLIB=$(ls build/libpng16.a build/libpng*.a build/png16.lib build/png*.lib 2>/dev/null | head -1)

          if [ "$RUNNER_OS" = "Linux" ]; then
            "$CXX" $HARNESS_CFLAGS $HARNESS_EXTRA \
              src/contrib/oss-fuzz/libpng_read_fuzzer.cc \
              "$PNGLIB" -lz \
              -I src -I build -I src/contrib/oss-fuzz \
              -o "out/png_libfuzzer_fuzzer"
          else
            ZLIBLIB=$(ls "$VCPKG_ROOT"/installed/x64-windows-static/lib/zlib*.lib 2>/dev/null | head -1)
            ZLIBINC="$VCPKG_ROOT/installed/x64-windows-static/include"
            "$CXX" $HARNESS_CFLAGS $HARNESS_EXTRA \
              src/contrib/oss-fuzz/libpng_read_fuzzer.cc \
              "$PNGLIB" "$ZLIBLIB" \
              -I src -I build -I src/contrib/oss-fuzz -I "$ZLIBINC" \
              /DEBUG \
              -o "out/png_libfuzzer_fuzzer.exe"
          fi

          # Ship the fuzzer dictionary alongside the binary.
          cp src/contrib/oss-fuzz/png.dict out/png_libfuzzer.dict 2>/dev/null || true

      - name: Smoke test
        shell: bash
        run: |
          BIN=$(ls out/png_libfuzzer_fuzzer out/png_libfuzzer_fuzzer.exe 2>/dev/null | head -1)
          "$BIN" -runs=1 >/dev/null 2>&1 || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: png-libfuzzer-${{ runner.os }}
          path: out/*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "tag=chrome-${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: artifacts/**/*
