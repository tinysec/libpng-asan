name: build

on:
  push:
    tags: ["v*", "chrome-*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Chrome version (e.g. 150.0.7871.24). Tags the release chrome-<version>. Leave empty for a build-only run."
        required: false

env:
  # Chrome's libpng fork. The Chrome-locked SHA lives in chrome.lock (written by
  # track.yml) so the default token can push bumps without touching this file.
  # NOTE: Chrome's fork ships only BUILD.gn (no CMakeLists.txt), so we compile
  # the shipped C sources directly rather than driving a CMake build.
  REPO: https://chromium.googlesource.com/chromium/src/third_party/libpng.git

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        # libFuzzer only. AFL++ (afl-clang-fast) is Linux-native and cannot run
        # on Windows; Windows AFL++ fuzzing is handled separately via WinAFL.
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Read Chrome-locked revision from chrome.lock
        id: lock
        shell: bash
        run: |
          echo "sha=$(jq -r .sha chrome.lock)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential zlib1g-dev git ca-certificates curl clang

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # clang-cl and the MSVC toolchain are preinstalled on windows-latest.
          # ninja is needed to build zlib from source in a later Windows step.
          # zlib is built from source rather than via vcpkg: on current images
          # VCPKG_ROOT points at an empty VS-bundled clone, so a vcpkg install
          # does not land where $VCPKG_ROOT expects.
          choco install ninja -y --no-progress

      - name: Fetch libpng source (Chrome-locked revision)
        shell: bash
        run: |
          git clone --no-checkout "$REPO" src
          git -C src fetch --depth 1 origin "${{ steps.lock.outputs.sha }}"
          git -C src checkout FETCH_HEAD

      - name: Resolve the libFuzzer toolchain
        shell: bash
        run: |
          # The harness (src/contrib/oss-fuzz/libpng_read_fuzzer.cc) is C++, so a
          # C++ compiler is required in addition to the C compiler that builds libpng.
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "CC=clang-cl" >> "$GITHUB_ENV"
            echo "CXX=clang-cl" >> "$GITHUB_ENV"
            echo "OBJEXT=obj" >> "$GITHUB_ENV"
            # /Zi + /DEBUG emit a side .pdb so ASAN stacks resolve to source.
            # /MT pins the static CRT so libpng objects, the harness, and the
            # from-source zlib all share one CRT -- required for clang-cl ASAN on
            # Windows. /Zi + /DEBUG emit a side .pdb so ASAN stacks resolve to src.
            echo "LIB_CFLAGS=-fsanitize=fuzzer-no-link,address -g -O1 /Zi /MT" >> "$GITHUB_ENV"
            echo "HARNESS_CFLAGS=-fsanitize=fuzzer,address -g -O1 /Zi /MT" >> "$GITHUB_ENV"
            echo "HARNESS_EXTRA=-EHsc" >> "$GITHUB_ENV"
          else
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
            echo "OBJEXT=o" >> "$GITHUB_ENV"
            echo "LIB_CFLAGS=-fsanitize=fuzzer-no-link,address -g -O1" >> "$GITHUB_ENV"
            echo "HARNESS_CFLAGS=-fsanitize=fuzzer,address -g -O1" >> "$GITHUB_ENV"
            echo "HARNESS_EXTRA=" >> "$GITHUB_ENV"
          fi

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build zlib from source (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          MSYS_NO_PATHCONV: "1"
        run: |
          # Build zlib locally with the static CRT (/MT) so it shares one CRT
          # with the clang-cl ASAN libpng objects and harness (required for
          # clang-cl ASAN on Windows). From-source avoids the vcpkg/VCPKG_ROOT
          # image-churn problem noted in the deps step.
          git clone --depth 1 --branch v1.3.1 https://github.com/madler/zlib.git zlib-src
          cmake -S zlib-src -B zlib-build -G Ninja \
            -DCMAKE_C_COMPILER=clang-cl \
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded \
            -DCMAKE_INSTALL_PREFIX="$PWD/zlib-install"
          cmake --build zlib-build --target install
          echo "ZLIB_INSTALL=$PWD/zlib-install" >> "$GITHUB_ENV"

      - name: Build libpng objects and the harness
        shell: bash
        env:
          # Stop Git-bash from rewriting clang-cl "/Zi" and "/DEBUG" flags into
          # C:/Program Files/Git/Zi paths (the classic MSYS arg-conversion bug).
          MSYS_NO_PATHCONV: "1"
        run: |
          mkdir -p obj out

          # Resolve the zlib lib/include from vcpkg once, up front, so both the
          # object-compile loop and the harness link step can see them. libpng's
          # private headers (pngstruct.h) #include "zlib.h", so the zlib include
          # dir must be on the path when compiling the .c objects, not only when
          # linking the harness.
          ZLIBLIB=""
          ZLIBINC=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            ZLIBLIB="$ZLIB_INSTALL/lib/zlibstatic.lib"
            ZLIBINC="$ZLIB_INSTALL/include"
          fi

          # The portable C core of libpng (skip pngtest.c). The Chrome fork ships a
          # ready-made pnglibconf.h at the root, so no config generation is needed.
          PNG_SRCS="src/png.c src/pngerror.c src/pngget.c src/pngmem.c src/pngpread.c \
            src/pngread.c src/pngrio.c src/pngrtran.c src/pngrutil.c src/pngset.c \
            src/pngtrans.c src/pngwio.c src/pngwrite.c src/pngwtran.c src/pngwutil.c"

          for c in $PNG_SRCS; do
            base=$(basename "${c%.c}")
            if [ "$RUNNER_OS" = "Windows" ]; then
              "$CC" -c $LIB_CFLAGS "$c" -I src -I "$ZLIBINC" -o "obj/${base}.${OBJEXT}"
            else
              "$CC" -c $LIB_CFLAGS "$c" -I src -o "obj/${base}.${OBJEXT}"
            fi
          done

          if [ "$RUNNER_OS" = "Linux" ]; then
            "$CXX" $HARNESS_CFLAGS $HARNESS_EXTRA \
              src/contrib/oss-fuzz/libpng_read_fuzzer.cc \
              obj/*.o -lz \
              -I src -I src/contrib/oss-fuzz \
              -o "out/png_libfuzzer_fuzzer"
          else
            "$CXX" $HARNESS_CFLAGS $HARNESS_EXTRA \
              src/contrib/oss-fuzz/libpng_read_fuzzer.cc \
              obj/*.o "$ZLIBLIB" \
              -I src -I src/contrib/oss-fuzz -I "$ZLIBINC" \
              /DEBUG \
              -o "out/png_libfuzzer_fuzzer.exe"
          fi

          # Ship the fuzzer dictionary alongside the binary.
          cp src/contrib/oss-fuzz/png.dict out/png_libfuzzer.dict 2>/dev/null || true

      - name: Smoke test
        shell: bash
        run: |
          # Pick whichever binary name this OS produced (no suffix on Linux,
          # .exe on Windows). Test each candidate explicitly rather than `ls`ing
          # both paths -- `ls a b` exits 2 when one path is missing, which under
          # `set -e -o pipefail` would abort the step even though the binary
          # built fine.
          BIN=""
          for cand in out/png_libfuzzer_fuzzer out/png_libfuzzer_fuzzer.exe; do
            if [ -f "$cand" ]; then BIN="$cand"; break; fi
          done
          "$BIN" -runs=1 >/dev/null 2>&1 || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: png-libfuzzer-${{ runner.os }}
          path: out/*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "tag=chrome-${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: artifacts/**/*
